# Environment - Add Nix binaries to PATH
env = PATH,$HOME/.nix-profile/bin:/nix/var/nix/profiles/default/bin:$PATH

# Monitors
source = ~/.config/hypr/monitors.conf
#monitor = [ (builtins.readFile ~/.config/hypr/workspaces.conf) ];

# STARTUP
source = ~/.config/hypr/startup.conf

xwayland {
  force_zero_scaling = true
}

# █▀▀ █▄░█ █░█   █░█ ▄▀█ █▀█
# ██▄ █░▀█ ▀▄▀   ▀▄▀ █▀█ █▀▄


# Input config
input {
    kb_layout = us
    #kb_variant = colemak,
    kb_options = grp:alt_shift_toggle #compose:menu,level3:ralt_switch
    kb_rules =
    follow_mouse = 2

    touchpad {
        natural_scroll = false
    }

    sensitivity = 1 # -1.0 - 1.0, 0 means no modification.
}

# █▀▀ █▀▀ █▄░█ █▀▀ █▀█ ▄▀█ █░░
# █▄█ ██▄ █░▀█ ██▄ █▀▄ █▀█ █▄▄

general {

    gaps_in = 5
    gaps_out = 20
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = scrolling
}


# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█ ░█░ █ █▄█ █░▀█

decoration {
    rounding = 10
}


# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
animations {
    enabled = yes
    bezier = ease,0.4,0.02,0.21,1
    animation = windows, 1, 3.5, ease, slide
    animation = windowsOut, 1, 3.5, ease, slide
    animation = border, 1, 6, default
    animation = fade, 1, 3, ease
    animation = workspaces, 1, 3.5, ease
}

# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# █▀ █▀▀ █▀█ █░░ █░░ █▀▀ █▀█
# ▄█ █▄▄ █▀▄ █▄▄ █▄▄ ██▄ █▀▄
scrolling {
    column_width = 0.5
    fullscreen_on_one_column = true
}

# █▄▀▄█ ▄▀▄ █ █▄░█  █▄▀▄█ ▄█▀█▄ █▀▀▄
# █░░░█ ▀▄▀ █ █░▀█  █░░░█ ▀█▄█▀ █▄▄▀

$mainMod = SUPER_CTRL_ALT #mapped to caps w/ kmonad

#Scroller binds (disable for dwindle)
bind = ctrl, left, layoutmsg, focus l
bind = ctrl, right, layoutmsg, focus r
# Move columns
bind = $mainMod, left, layoutmsg, move -col
bind = $mainMod SHIFT, right, layoutmsg, move +col
# Swap column with neighbor
bind = $mainMod, comma, layoutmsg, swapcol l
bind = $mainMod, period, layoutmsg, swapcol r

# Resize column width (cycles through explicit_column_widths)
bind = $mainMod, minus, layoutmsg, colresize -conf
bind = $mainMod, equal, layoutmsg, colresize +conf

# Dwindle keys (disable for scroller)

#bind = ctrl, right, workspace, e+1
#bind = ctrl, left, workspace, e-1




# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, right, movetoworkspace, e+1
bind = $mainMod SHIFT, left, movetoworkspace, e-1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


windowrule = opacity 0.8 0.8, match:class ^(kitty)$
windowrule = opacity 0.8 0.8, match:class ^(Alacritty)$
windowrule = opacity 0.8 0.8, match:float yes
windowrule = animation popin, float on, opacity 0.6 0.6, size 55% 55%, center on, match:class ^(Alacritty)$
windowrule = animation popin, float on, opacity 0.6 0.6, size 55% 55%, center on, match:class ^(kitty)$
windowrule = float on, match:class ^(Alacritty)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, opacity 1.0 1.0, match:class ^(steam)$
windowrule = stay_focused on, match:class ^(pinentry-) # fix pinentry losing focus
windowrule = float on, match:class ^(kitty-bg)$
windowrule = size 3840 1600, match:class ^(kitty-bg)$
windowrule = move 0 0, match:class ^(kitty-bg)$

# Apps
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, A, exec, alacritty
bind = $mainMod, K, exec, kitty
bind = $mainMod, B, exec, google-chrome-stable
bind = $mainMod, F, exec, thunar
bind = $mainMod, T, exec, google-chrome-stable --profile-directory=Default --app-id=cifhbcnohmdccbgoicgdjpfamggdegmo #Teams PWA
bind = $mainMod, O, exec, google-chrome-stable --profile-directory=Default --app-id=faolnafnngnfdaknnbpnkhgohbobgegn #outlook pwa
bind = $mainMod, M, exec, google-chrome-stable --profile-directory=Default --app-id=hpfldicfbfomlpcikngkocigghgafkph # Google Messages PWA
bind = $mainMod, C, exec, code #vs code
bind = $mainMod, N, exec, obsidian #notes
bind = $mainMod, V, exec, cava_toggle

# Menus
bind = $mainMod, R, exec, rofiWindow
bind = $mainMod, SPACE, exec, rofiWindow
bind = $mainMod, L, exec, rofiPowerMenu
bind = $mainMod, P, exec, swaync-client -t        # toggle notification panel
bind = $mainMod SHIFT, P, exec, swaync-client -d  # toggle do not disturb

# Commands
bind = $mainMod, Q, killactive,
bind = $mainMod, END, exit,
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim -g "$(slurp)"

# Window Management
bind = $mainMod, G, fullscreen,
bind = $mainMod, home, pseudo, # dwindle
bind = $mainMod, page_down, togglesplit, # dwindle
bind = $mainMod, page_up, togglefloating, #dwindle

# Displays
bind = $mainMod, S, exec, ~/.config/kanshi/switch.sh

# Layout toggle + Scrolling operations
#bind = $mainMod SHIFT, S, exec, LAYOUT=$(hyprctl -j getoption general:layout | jq -r .str); [ "$LAYOUT" = "dwindle" ] && hyprctl keyword general:layout scrolling || hyprctl keyword general:layout dwindle
bind = $mainMod SHIFT, up, layoutmsg, colresize +conf  # widen column (cycles explicit_column_widths)
bind = $mainMod SHIFT, down, layoutmsg, colresize -conf # narrow column (cycles explicit_column_widths)


# Functional keybinds
bind = SUPER, SPACE,exec,hyprctl switchxkblayout next # Example: Switch to the next layout using Super+Space
bind =,XF86AudioMicMute,exec,pamixer --default-source -t
bind =,XF86MonBrightnessDown,exec,light -U 20
bind =,XF86MonBrightnessUp,exec,light -A 20
bind =,XF86AudioMute,exec,pamixer -t
bind =,XF86AudioLowerVolume,exec,pamixer -d 1
bind =,XF86AudioRaiseVolume,exec,pamixer -i 1
bind =,XF86AudioPlay,exec,playerctl play-pause
bind =,XF86AudioPause,exec,playerctl play-pause

# to switch between windows in a floating workspace
bind = $mainMod,Tab,cyclenext,
bind = SUPER,Tab,bringactivetotop,

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = ALT, mouse:272, resizewindow

plugin {
    hyprtrails {
        color = rgba(ffaa00ff)
    }
    hyprwinwrap {
        class = kitty-bg
    }
    hyprbars {
        bar_height = 30
        bar_buttons_alignment = left
        hyprbars-button = rgb(ff4040), 15, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 15, , hyprctl dispatch fullscreen 1
    }
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        enable_gesture = true # laptop touchpad, 4 fingers
        #gesture_distance = 300 # how far is the "max"
        #gesture_positive = true # positive = swipe down. Negative = swipe up.
    }
}

#bind = SUPER, grave, hyprexpo:expo, toggle # can be: toggle, off/disable or on/enable
