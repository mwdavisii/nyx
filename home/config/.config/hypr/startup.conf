# Autostart
exec=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec=dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec=systemctl --user restart kanshi

exec-once=dbus-update-activation-environment --all
exec-once=hyprpm reload -n
exec-once=wallpaper_default
exec-once=quickshell --path /etc/xdg/quickshell/caelestia >/dev/null 2>&1
#exec-once=swww init
exec-once=hypridle
exec-once=gamepad_idle_inhibit >/dev/null 2>&1
#exec-once=kanshi

exec-once=~/.config/kmonad/selectKBD.sh

source=~/.cache/wal/colors-hyprland

